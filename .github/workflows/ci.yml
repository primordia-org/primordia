# .github/workflows/ci.yml
#
# Type-check and lint on every PR.
# This is a required check — PRs cannot be merged until it passes.
#
# We skip these checks inside `next build` (see next.config.ts) so that
# Vercel deployments are fast. This workflow ensures correctness is still
# enforced before code reaches main.

name: CI

on:
  pull_request:
    branches: [main]
  merge_group:
    branches: [main]

jobs:
  typecheck-and-lint:
    name: Typecheck & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.0"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate build artifacts
        run: bun run prebuild

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint
