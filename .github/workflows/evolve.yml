# .github/workflows/evolve.yml
#
# The Primordia Evolve Pipeline
# ──────────────────────────────────────────────────────────────────────────────
# Triggered when @claude is mentioned in an issue, issue comment, or PR review
# comment. The app's /api/evolve route always prepends @claude to the issue
# body it creates, so no special label or extra setup is required.
#
# Uses the official anthropics/claude-code-action to handle branching,
# committing, PR creation, and issue commenting automatically.
#
# Required GitHub repository secrets:
#   ANTHROPIC_API_KEY  — used by Claude Code Action

name: Primordia Evolve Pipeline

on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  evolve:
    if: |
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Edit,Write,Read,Bash,Glob,Grep"
            --system-prompt "You are working on Primordia, a self-modifying web application built with TypeScript, Tailwind CSS, and Next.js App Router. Keep changes minimal and focused on the request. Do not introduce new dependencies unless absolutely required. Maintain the existing code style. Read PRIMORDIA.md for architecture context and update its Changelog section with a brief entry describing what you changed and why."

      - name: Create Pull Request
        if: github.event_name == 'issues' && steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
        run: |
          if gh pr list --head "$BRANCH" --json number --jq '.[0].number' | grep -q .; then
            echo "PR already exists for branch $BRANCH"
          else
            gh pr create \
              --head "$BRANCH" \
              --base main \
              --title "Evolve: $ISSUE_TITLE" \
              --body "Closes #$ISSUE_NUMBER\n\nGenerated with [Claude Code](https://claude.ai/code)"
          fi
