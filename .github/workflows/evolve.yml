# .github/workflows/evolve.yml
#
# The Primordia Evolve Pipeline
# ──────────────────────────────────────────────────────────────────────────────
# Triggered when @claude is mentioned in an issue, issue comment, or PR review
# comment. The app's /api/evolve route always prepends @claude to the issue
# body it creates, so no special label or extra setup is required.
#
# Uses the official anthropics/claude-code-action to handle branching,
# committing, PR creation, and issue commenting automatically.
#
# Required GitHub repository secrets:
#   ANTHROPIC_API_KEY  — used by Claude Code Action

name: Primordia Evolve Pipeline

on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  evolve:
    if: |
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: blacksmith-4vcpu-ubuntu-2404
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Edit,Write,Read,Bash,Glob,Grep"
            --system-prompt "You are working on Primordia, a self-modifying web application built with TypeScript, Tailwind CSS, and Next.js App Router. Keep changes minimal and focused on the request. Do not introduce new dependencies unless absolutely required. Maintain the existing code style. Read PRIMORDIA.md for architecture context and update its Changelog section with a brief entry describing what you changed and why."

      - name: Create Pull Request
        if: github.event_name == 'issues' && steps.claude.outputs.branch_name != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          BRANCH: ${{ steps.claude.outputs.branch_name }}
        run: |
          if gh pr list --head "$BRANCH" --json number --jq '.[0].number' | grep -q .; then
            echo "PR already exists for branch $BRANCH"
            exit 0
          fi

          # Extract Claude's generated title and body from the compare URL in the issue comments.
          # The action posts a "[Create a PR](...?quick_pull=1&title=...&body=...)" link whose
          # query params contain the real PR title and description Claude wrote.
          COMPARE_URL=$(gh issue view "$ISSUE_NUMBER" --json comments \
            --jq '[.comments[].body | scan("https://[^)]+quick_pull=1[^)]*")] | last')

          if [ -n "$COMPARE_URL" ]; then
            PR_TITLE=$(python3 -c "import urllib.parse; qs = urllib.parse.urlparse('$COMPARE_URL').query; print(urllib.parse.parse_qs(qs).get('title', [''])[0])")
            PR_BODY=$(python3 -c "import urllib.parse; qs = urllib.parse.urlparse('$COMPARE_URL').query; print(urllib.parse.parse_qs(qs).get('body', [''])[0])")
          fi

          # Fall back to a generic title/body if parsing failed
          PR_TITLE="${PR_TITLE:-"Issue #$ISSUE_NUMBER: Changes from Claude"}"
          PR_BODY="${PR_BODY:-"Closes #$ISSUE_NUMBER\n\nGenerated with [Claude Code](https://claude.ai/code)"}"

          gh pr create \
            --head "$BRANCH" \
            --base main \
            --title "$PR_TITLE" \
            --body "$PR_BODY"

          # Trigger Vercel to rebuild with full PR context
          git commit --allow-empty -m "Trigger Vercel rebuild" && git push origin "$BRANCH"
