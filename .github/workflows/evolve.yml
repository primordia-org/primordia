# .github/workflows/evolve.yml
#
# The Primordia Evolve Pipeline
# ──────────────────────────────────────────────────────────────────────────────
# Triggered when:
#   - A GitHub Issue is labeled "primordia-evolve" (the issue body always
#     contains @claude, added by the app's /api/evolve route)
#   - @claude is mentioned in an issue, issue comment, or PR review comment
#
# Uses the official anthropics/claude-code-action to handle branching,
# committing, PR creation, and issue commenting automatically.
#
# Required GitHub repository secrets:
#   ANTHROPIC_API_KEY  — used by Claude Code Action
#
# Required repository setup:
#   - A label named "primordia-evolve" must exist in the repo
#   - Vercel must be connected to the repo for preview deployments

name: Primordia Evolve Pipeline

on:
  issues:
    types: [labeled, opened, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

jobs:
  evolve:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'primordia-evolve') ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude'))) ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Edit,Write,Read,Bash,Glob,Grep"
            --system-prompt "You are working on Primordia, a self-modifying web application built with TypeScript, Tailwind CSS, and Next.js App Router. Keep changes minimal and focused on the request. Do not introduce new dependencies unless absolutely required. Maintain the existing code style. Read PRIMORDIA.md for architecture context and update its Changelog section with a brief entry describing what you changed and why."
